<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<script>
			// Apply dark mode before first paint to avoid a light-mode flash
			try {
				const t = localStorage.getItem('theme');
				if (t === 'dark' || (t !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches))
					document.documentElement.classList.add('dark');
			} catch {}
		</script>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="google-site-verification" content="lY3T9wYvW0MIBngfpj9vswTsWN6Ya8HVyhdjPId4bBc" />

		<!-- Favicon and App Icons -->
		<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="shortcut icon" href="/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-title" content="Cardenas Pacheco" />
		<link rel="manifest" href="/site.webmanifest" />

		<!-- Theme and App Meta (CSS vars don't work here; use real colors) -->
		<meta name="theme-color" content="#faf9f7" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#161311" media="(prefers-color-scheme: dark)" />

		%sveltekit.head%
	</head>
	<body class="bg-background text-foreground">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
